<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Prezzario LOM26 - Navigazione Gerarchica</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; text-align: center; }
        
        /* Pannello Filtri */
        .filter-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        select, input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; width: 100%; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #1a73e8; color: white; padding: 12px; text-align: left; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        .codice { font-family: monospace; font-weight: bold; color: #1a73e8; }
        .stats { margin-bottom: 10px; font-weight: bold; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h2>Navigazione Prezzario LOM26</h2>
    
    <div class="filter-panel">
        <!-- Filtri ad albero -->
        <select id="filtroGenere"><option value="">Seleziona Genere (es. OC)</option></select>
        <select id="filtroFamiglia" disabled><option value="">Seleziona Famiglia</option></select>
        <select id="filtroCategoria" disabled><option value="">Seleziona Categoria</option></select>
        <input type="text" id="filtroTesto" placeholder="Ricerca libera (parola chiave)...">
    </div>

    <div id="stats" class="stats">Caricamento database...</div>

    <table>
        <thead>
            <tr>
                <th style="width:20%">Codice</th>
                <th>Descrizione</th>
                <th style="width:10%">Prezzo</th>
            </tr>
        </thead>
        <tbody id="corpoTabella"></tbody>
    </table>
</div>

<script>
    let datiPrezzario = [];
    
    async function init() {
        const response = await fetch('dati.json');
        datiPrezzario = await response.json();
        popolaFiltro('filtroGenere', 0); // Popola il primo livello (es. OC, IM)
        aggiornaVista();
    }

    // Funzione per estrarre i livelli dal codice (es: OC.EEA.PA01 -> [OC, EEA, PA01])
    function getLivelli(codice) {
        return codice ? codice.split('.') : [];
    }

    function popolaFiltro(idElemento, indiceLivello, prefisso = "") {
        const select = document.getElementById(idElemento);
        const termini = new Set();
        
        datiPrezzario.forEach(v => {
            const livelli = getLivelli(v.Codice);
            if (livelli[indiceLivello] && v.Codice.startsWith(prefisso)) {
                termini.add(livelli[indiceLivello]);
            }
        });

        select.innerHTML = `<option value="">Tutti (${idElemento.replace('filtro','')})</option>`;
        Array.from(termini).sort().forEach(t => {
            select.innerHTML += `<option value="${t}">${t}</option>`;
        });
    }

    function aggiornaVista() {
        const gen = document.getElementById('filtroGenere').value;
        const fam = document.getElementById('filtroFamiglia').value;
        const cat = document.getElementById('filtroCategoria').value;
        const testo = document.getElementById('filtroTesto').value.toLowerCase();

        const filtrati = datiPrezzario.filter(v => {
            const livelli = getLivelli(v.Codice);
            const matchGen = !gen || livelli[0] === gen;
            const matchFam = !fam || livelli[1] === fam;
            const matchCat = !cat || livelli[2] === cat;
            const matchTesto = !testo || v.Declaratoria.toLowerCase().includes(testo) || v.Codice.toLowerCase().includes(testo);
            return matchGen && matchFam && matchCat && matchTesto;
        });

        document.getElementById('stats').innerText = `Voci trovate: ${filtrati.length}`;
        
        const corpo = document.getElementById('corpoTabella');
        corpo.innerHTML = filtrati.slice(0, 50).map(v => `
            <tr>
                <td class="codice">${v.Codice}</td>
                <td>${v.Declaratoria}</td>
                <td>€ ${v.Prezzo}</td>
            </tr>
        `).join('');
    }

    // Eventi per rendere i filtri dipendenti l'uno dall'altro
    document.getElementById('filtroGenere').addEventListener('change', function() {
        const fam = document.getElementById('filtroFamiglia');
        if (this.value) {
            fam.disabled = false;
            popolaFiltro('filtroFamiglia', 1, this.value + ".");
        } else {
            fam.disabled = true;
            document.getElementById('filtroCategoria').disabled = true;
        }
        aggiornaVista();
    });

    document.getElementById('filtroFamiglia').addEventListener('change', function() {
        const cat = document.getElementById('filtroCategoria');
        const gen = document.getElementById('filtroGenere').value;
        if (this.value) {
            cat.disabled = false;
            popolaFiltro('filtroCategoria', 2, gen + "." + this.value + ".");
        } else {
            cat.disabled = true;
        }
        aggiornaVista();
    });

    document.getElementById('filtroCategoria').addEventListener('change', aggiornaVista);
    document.getElementById('filtroTesto').addEventListener('input', aggiornaVista);

    init();
</script>
</body>
</html>
