<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>LOM26 - Dashboard Agile</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --accent: #d93025; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        
        /* Sidebar con filtri LIBERI */
        .sidebar { width: 340px; background: white; border-right: 1px solid #dadce0; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
        .sidebar h3 { margin: 10px 0 5px 0; font-size: 12px; color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 3px; text-transform: uppercase; }
        .filter-group { display: flex; flex-direction: column; gap: 2px; }
        label { font-size: 10px; font-weight: bold; color: #5f6368; }
        select, input { padding: 6px; border: 1px solid #dadce0; border-radius: 4px; font-size: 12px; width: 100%; box-sizing: border-box; }

        /* Main Area */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        header { background: white; padding: 10px 20px; border-bottom: 1px solid #dadce0; display: flex; gap: 15px; align-items: center; }
        
        .btn-diff { padding: 8px 16px; cursor: pointer; border-radius: 20px; border: 1px solid #ccc; font-size: 11px; font-weight: bold; background: #fff; transition: 0.3s; white-space: nowrap; }
        .btn-diff.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* Tabella Pulita */
        .table-area { flex: 1; overflow-y: auto; background: white; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: #f1f3f4; padding: 12px; text-align: left; font-size: 11px; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #dadce0; cursor: pointer; }
        
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; vertical-align: top; cursor: pointer; }
        tr.main-row:hover { background: #f8f9fa; }
        
        .col-cod { width: 180px; font-family: monospace; font-weight: bold; color: var(--primary); }
        .col-pre { width: 100px; text-align: right; font-weight: bold; }
        .text-truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }

        /* Dettaglio Espandibile */
        .details-row { display: none; background: #fafafa; border-left: 5px solid var(--primary); }
        .details-content { padding: 20px; font-size: 12px; line-height: 1.6; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .indent-mark { font-weight: bold; color: #333; display: block; margin-top: 8px; border-bottom: 1px solid #eee; }
        .diff-mark { color: var(--accent); font-weight: bold; background: #fff0f0; padding: 0 2px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <button onclick="resetTutto()" style="padding:10px; cursor:pointer; background:var(--primary); color:white; border:none; border-radius:4px; font-weight:bold; margin-bottom:10px;">RESET TUTTO</button>
        <h3>Struttura</h3>
        <div id="filtri-gerarchia"></div>
        <h3>Parametri</h3>
        <div class="filter-group"><label>SETTORE MERCEOLOGICO</label><select id="f-Settore"><option value="">Tutti</option></select></div>
    </aside>

    <main class="main">
        <header>
            <input type="text" id="search" placeholder="🔍 Cerca nel testo o codice..." style="flex:1; padding: 10px 15px; border-radius: 20px; border: 1px solid #ccc;">
            <button id="btnDiff" class="btn-diff" onclick="toggleDiff()">CONFRONTO DIFFERENZE: OFF</button>
            <div id="stats" style="font-size:12px; font-weight:bold; color:var(--primary); white-space:nowrap;">Voci: 0</div>
        </header>

        <div class="table-area">
            <table id="mainTable">
                <thead>
                    <tr>
                        <th class="col-cod" onclick="ordina('Codice')">CODICE</th>
                        <th onclick="ordina('Declaratoria')">DESCRIZIONE (Clicca per espandere)</th>
                        <th class="col-pre" onclick="ordina('Prezzo')">PREZZO</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </main>

<script>
    let fullData = [];
    let datiFiltrati = [];
    let showDiff = false;
    let sortConfig = { campo: 'Codice', asc: true };

    const nomiLivelli = ["GENERE", "MACROSETTORE", "SETTORE", "MANUFATTO/DESTINAZIONE", "INTERVENTO", "ATTIVITÀ", "LAVORAZIONE", "DISCIPLINA", "SISTEMA", "UNITÀ TECNOLOGICA", "MATERIA"];
    const configFiltri = { 'f-Settore': 'Settore merceologico' };
    nomiLivelli.forEach((n, i) => configFiltri[`f-Liv${i+1}`] = `Descr. Liv. ${i+1}`);

    async function init() {
        const res = await fetch('./dati.json');
        const json = await res.json();
        fullData = Object.values(json.Ricerca || json);
        
        const container = document.getElementById('filtri-gerarchia');
        nomiLivelli.forEach((nome, i) => {
            container.innerHTML += `<div class="filter-group"><label>${nome}</label><select id="f-Liv${i+1}"></select></div>`;
        });

        applicaFiltri();
    }

    function toggleDiff() {
        showDiff = !showDiff;
        const btn = document.getElementById('btnDiff');
        btn.innerText = `CONFRONTO DIFFERENZE: ${showDiff ? 'ON' : 'OFF'}`;
        btn.classList.toggle('active');
        render(datiFiltrati);
    }

    function formattaDettaglio(testo, precedente) {
        if (!testo) return "";
        let out = testo;
        if (showDiff && precedente) {
            let pC = testo.split(' '), pP = precedente.split(' ');
            out = pC.map((p, i) => (p !== pP[i]) ? `<span class="diff-mark">${p}</span>` : p).join(' ');
        }
        return out.replace(/(OPERA:|LAVORO:|SPECIFICHE TECNICHE:|PRODOTTO SEMILAVORATO:|Incluso:|RM\d|LV\d|OP\d)/g, '<br><span class="indent-mark">$1</span>');
    }

    function ordina(campo) {
        sortConfig.asc = (sortConfig.campo === campo) ? !sortConfig.asc : true;
        sortConfig.campo = campo;
        datiFiltrati.sort((a, b) => (sortConfig.asc ? (a[campo] > b[campo] ? 1 : -1) : (a[campo] < b[campo] ? 1 : -1)));
        render(datiFiltrati);
    }

    function applicaFiltri() {
        const q = document.getElementById('search').value.toLowerCase();
        datiFiltrati = fullData.filter(item => {
            if (q && !item.Declaratoria.toLowerCase().includes(q) && !item.Codice.toLowerCase().includes(q)) return false;
            for (let id in configFiltri) {
                const val = document.getElementById(id).value;
                if (val && item[configFiltri[id]] !== val) return false;
            }
            return true;
        });
        document.getElementById('stats').innerText = `Trovate: ${datiFiltrati.length}`;
        aggiornaTendine(q);
        render(datiFiltrati);
    }

    function aggiornaTendine(q) {
        Object.keys(configFiltri).forEach(id => {
            const select = document.getElementById(id);
            const valAttuale = select.value;
            const campo = configFiltri[id];
            
            // Logica BIDIREZIONALE: i filtri mostrano solo cosa resta dopo search + ALTRI filtri
            const disponibili = fullData.filter(item => {
                if (q && !item.Declaratoria.toLowerCase().includes(q)) return false;
                for (let idAltro in configFiltri) {
                    if (idAltro === id) continue;
                    const valAltro = document.getElementById(idAltro).value;
                    if (valAltro && item[configFiltri[idAltro]] !== valAltro) return false;
                }
                return true;
            });

            const unici = [...new Set(disponibili.map(i => i[campo]).filter(v => v && v !== "nd"))].sort();
            select.innerHTML = `<option value="">Tutti (${unici.length})</option>`;
            unici.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v; opt.textContent = v;
                if (v === valAttuale) opt.selected = true;
                select.appendChild(opt);
            });
            select.onchange = applicaFiltri;
        });
    }

    function render(data) {
        const body = document.getElementById('tableBody');
        body.innerHTML = data.slice(0, 80).map((v, i) => `
            <tr class="main-row" onclick="toggleDet(${i})">
                <td class="col-cod">${v.Codice}</td>
                <td><span class="text-truncate">${v.Declaratoria}</span></td>
                <td class="col-pre">€ ${Number(v.Prezzo).toLocaleString('it-IT', {minimumFractionDigits: 2})}</td>
            </tr>
            <tr id="det-${i}" class="details-row">
                <td colspan="3">
                    <div class="details-content">
                        <div>
                            <strong>DESCRIZIONE STRUTTURATA</strong>
                            <div style="margin-top:10px;">${formattaDettaglio(v.Declaratoria, i > 0 ? data[i-1].Declaratoria : null)}</div>
                        </div>
                        <div style="border-left: 1px solid #eee; padding-left: 20px;">
                            <strong>SCHEDA TECNICA</strong><br>
                            U.M: ${v['U.M.']} | R.U.: ${v['Rapporto R.U.']}<br><br>
                            ${nomiLivelli.map((n, idx) => `<div style="font-size:10px; margin-bottom:2px;"><strong>${n}:</strong> ${v['Descr. Liv. '+(idx+1)] || '-'}</div>`).join('')}
                        </div>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    function toggleDet(i) {
        const d = document.getElementById(`det-${i}`);
        d.style.display = d.style.display === 'table-row' ? 'none' : 'table-row';
    }

    function resetTutto() {
        document.querySelectorAll('select').forEach(s => s.value = "");
        document.getElementById('search').value = "";
        applicaFiltri();
    }

    document.getElementById('search').addEventListener('input', applicaFiltri);
    init();
</script>
</body>
</html>
