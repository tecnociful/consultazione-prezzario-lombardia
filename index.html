<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>LOM26 - Analizzatore Avanzato</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 320px; background: white; border-right: 1px solid #dadce0; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .sidebar h3 { margin: 10px 0 5px 0; font-size: 11px; color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 3px; text-transform: uppercase; }
        .filter-group { display: flex; flex-direction: column; gap: 2px; }
        label { font-size: 9px; font-weight: bold; color: #5f6368; }
        select, input { padding: 6px; border: 1px solid #dadce0; border-radius: 4px; font-size: 11px; width: 100%; }

        /* Main Area */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        header { background: white; padding: 10px 20px; border-bottom: 1px solid #dadce0; display: flex; gap: 15px; align-items: center; }
        
        /* Controlli aggiuntivi */
        .toggle-btn { padding: 6px 12px; cursor: pointer; border-radius: 20px; border: 1px solid #ccc; font-size: 11px; font-weight: bold; background: #eee; }
        .toggle-btn.active { background: #d93025; color: white; border-color: #b22a1e; }

        .table-area { flex: 1; overflow-y: auto; padding: 0; }
        table { width: 100%; border-collapse: collapse; background: white; table-layout: fixed; }
        
        th { background: #f1f3f4; padding: 12px; text-align: left; font-size: 11px; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #dadce0; cursor: pointer; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 12px; vertical-align: top; }
        
        .col-codice { width: 180px; font-family: monospace; font-weight: bold; color: var(--primary); }
        .col-prezzo { width: 110px; text-align: right; font-weight: bold; }

        /* Struttura Indentata */
        .descr-block { margin-bottom: 4px; display: block; }
        .indent-1 { padding-left: 0; font-weight: bold; color: #333; margin-top: 5px; }
        .indent-2 { padding-left: 20px; color: #555; font-style: italic; }
        .indent-3 { padding-left: 40px; color: #666; border-left: 2px solid #ddd; margin: 2px 0 2px 40px; }

        .diff-text { color: #d93025; font-weight: bold; background: #fff0f0; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <button onclick="resetTutto()" style="padding:10px; cursor:pointer; background:var(--primary); color:white; border:none; border-radius:4px; font-size:11px; font-weight:bold;">RESET FILTRI</button>
        <div id="livelli-container"></div>
        <h3>Parametri</h3>
        <div class="filter-group"><label>Settore Merceologico</label><select id="f-Settore"><option value="">Tutti</option></select></div>
    </aside>

    <main class="main">
        <header>
            <input type="text" id="search" placeholder="🔍 Cerca nel testo o codice..." style="flex:1; padding: 8px 15px; border-radius: 20px; border: 1px solid #ccc;">
            <button id="btnDiff" class="toggle-btn" onclick="toggleDiff()">EVIDENZIA DIFFERENZE: OFF</button>
            <div id="stats" style="font-size:12px; font-weight:bold; color:var(--primary)">Voci: 0</div>
        </header>

        <div class="table-area">
            <table>
                <thead>
                    <tr>
                        <th class="col-codice" onclick="ordina('Codice')">CODICE</th>
                        <th onclick="ordina('Declaratoria')">DESCRIZIONE STRUTTURATA (Clicca per ordinare)</th>
                        <th class="col-prezzo" onclick="ordina('Prezzo')">PREZZO</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </main>

<script>
    let fullData = [];
    let datiFiltrati = [];
    let showDiff = false;
    let sortConfig = { campo: 'Codice', asc: true };

    const nomiLivelli = ["GENERE", "MACROSETTORE", "SETTORE", "MANUFATTO/DESTINAZIONE", "INTERVENTO", "ATTIVITÀ", "LAVORAZIONE", "DISCIPLINA", "SISTEMA", "UNITÀ TECNOLOGICA", "MATERIA"];
    const configFiltri = { 'f-Settore': 'Settore merceologico' };
    nomiLivelli.forEach((n, i) => configFiltri[`f-Liv${i+1}`] = `Descr. Liv. ${i+1}`);

    async function init() {
        const res = await fetch('./dati.json');
        const json = await res.json();
        fullData = Object.values(json.Ricerca || json);
        
        const container = document.getElementById('livelli-container');
        nomiLivelli.forEach((nome, i) => {
            container.innerHTML += `<h3>${nome}</h3><div class="filter-group"><select id="f-Liv${i+1}"></select></div>`;
        });

        applicaFiltri();
    }

    function toggleDiff() {
        showDiff = !showDiff;
        const btn = document.getElementById('btnDiff');
        btn.innerText = `EVIDENZIA DIFFERENZE: ${showDiff ? 'ON' : 'OFF'}`;
        btn.classList.toggle('active');
        render(datiFiltrati);
    }

    // Funzione per formattare il testo come nell'immagine
    function formattaDescrizione(testo) {
        if (!testo) return "";
        // Sostituisce i punti e virgola o i punti seguiti dalle keyword con dei "marker" per andare a capo
        let formatted = testo
            .replace(/OPERA:/g, '<span class="descr-block indent-1">OPERA:</span>')
            .replace(/LAVORO:/g, '<span class="descr-block indent-1">LAVORO:</span>')
            .replace(/SPECIFICHE TECNICHE:/g, '<span class="descr-block indent-2">SPECIFICHE TECNICHE:</span>')
            .replace(/PRODOTTO SEMILAVORATO:/g, '<span class="descr-block indent-2">PRODOTTO SEMILAVORATO:</span>')
            .replace(/Incluso:/g, '<span class="descr-block indent-2">Incluso:</span>')
            .replace(/RM\d|LV\d|OP\d/g, match => `<span class="descr-block indent-3">${match}</span>`);
        
        return formatted;
    }

    function evidenziaDiff(testoCorrente, testoPrecedente) {
        if (!showDiff || !testoPrecedente) return formattaDescrizione(testoCorrente);
        let paroleC = testoCorrente.split(' ');
        let paroleP = testoPrecedente.split(' ');
        let finale = paroleC.map((p, i) => (p !== paroleP[i]) ? `<span class="diff-text">${p}</span>` : p).join(' ');
        return formattaDescrizione(finale);
    }

    function ordina(campo) {
        sortConfig.asc = (sortConfig.campo === campo) ? !sortConfig.asc : true;
        sortConfig.campo = campo;
        datiFiltrati.sort((a, b) => {
            let valA = a[campo], valB = b[campo];
            if(campo === 'Prezzo') return sortConfig.asc ? valA - valB : valB - valA;
            return sortConfig.asc ? String(valA).localeCompare(String(valB)) : String(valB).localeCompare(String(valA));
        });
        render(datiFiltrati);
    }

    function applicaFiltri() {
        const query = document.getElementById('search').value.toLowerCase();
        datiFiltrati = fullData.filter(item => {
            if (query && !item.Declaratoria.toLowerCase().includes(query) && !item.Codice.toLowerCase().includes(query)) return false;
            for (let id in configFiltri) {
                const val = document.getElementById(id).value;
                if (val && item[configFiltri[id]] !== val) return false;
            }
            return true;
        });
        document.getElementById('stats').innerText = `VOCI: ${datiFiltrati.length}`;
        aggiornaOpzioniFiltri(query);
        render(datiFiltrati);
    }

    function aggiornaOpzioniFiltri(query) {
        Object.keys(configFiltri).forEach(idSelect => {
            const select = document.getElementById(idSelect);
            const valAttuale = select.value;
            const target = configFiltri[idSelect];
            const disponibili = fullData.filter(item => {
                if (query && !item.Declaratoria.toLowerCase().includes(query)) return false;
                for (let id in configFiltri) {
                    if (id === idSelect) continue;
                    const v = document.getElementById(id).value;
                    if (v && item[configFiltri[id]] !== v) return false;
                }
                return true;
            });
            const unici = [...new Set(disponibili.map(i => i[target]).filter(v => v && v !== "nd"))].sort();
            select.innerHTML = `<option value="">Tutti (${unici.length})</option>`;
            unici.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v; opt.textContent = v;
                if (v === valAttuale) opt.selected = true;
                select.appendChild(opt);
            });
            select.onchange = applicaFiltri;
        });
    }

    function render(data) {
        const body = document.getElementById('tableBody');
        body.innerHTML = data.slice(0, 50).map((v, i) => `
            <tr>
                <td class="col-codice">${v.Codice}</td>
                <td>${evidenziaDiff(v.Declaratoria, i > 0 ? data[i-1].Declaratoria : null)}</td>
                <td class="col-prezzo">€ ${Number(v.Prezzo).toLocaleString('it-IT', {minimumFractionDigits: 2})}</td>
            </tr>
        `).join('');
    }

    function resetTutto() {
        document.querySelectorAll('select').forEach(s => s.value = "");
        document.getElementById('search').value = "";
        applicaFiltri();
    }

    document.getElementById('search').addEventListener('input', applicaFiltri);
    init();
</script>
</body>
</html>
