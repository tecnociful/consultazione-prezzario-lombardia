<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>LOM26 - Consultazione Agile</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --diff-text: #d93025; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        
        .sidebar { width: 320px; background: white; border-right: 1px solid #dadce0; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
        .sidebar h3 { margin: 10px 0 5px 0; font-size: 11px; color: var(--primary); border-bottom: 1px solid #eee; padding-bottom: 3px; text-transform: uppercase; }
        .filter-group { display: flex; flex-direction: column; gap: 2px; }
        label { font-size: 9px; font-weight: bold; color: #5f6368; }
        select, input { padding: 6px; border: 1px solid #dadce0; border-radius: 4px; font-size: 11px; width: 100%; }

        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        header { background: white; padding: 10px 20px; border-bottom: 1px solid #dadce0; display: flex; gap: 15px; align-items: center; }
        
        .toggle-btn { padding: 6px 12px; cursor: pointer; border-radius: 20px; border: 1px solid #ccc; font-size: 11px; font-weight: bold; background: #eee; }
        .toggle-btn.active { background: #d93025; color: white; border-color: #b22a1e; }

        .table-area { flex: 1; overflow-y: auto; background: white; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: #f1f3f4; padding: 12px; text-align: left; font-size: 11px; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #dadce0; cursor: pointer; }
        
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; vertical-align: top; cursor: pointer; }
        tr.main-row:hover { background: #f8f9fa; }
        
        .col-cod { width: 180px; font-family: monospace; font-weight: bold; color: var(--primary); }
        .col-pre { width: 100px; text-align: right; font-weight: bold; }
        .text-truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }

        /* Area Dettaglio Espandibile */
        .details-row { display: none; background: #fafafa; border-left: 4px solid var(--primary); }
        .details-content { padding: 20px; font-size: 12px; line-height: 1.6; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .descr-indent { display: block; margin-top: 5px; }
        .indent-mark { font-weight: bold; color: #333; display: block; margin-top: 8px; }
        .diff-mark { color: var(--diff-text); font-weight: bold; background: #fff0f0; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <button onclick="resetTutto()" style="padding:10px; cursor:pointer; background:var(--primary); color:white; border:none; border-radius:4px; font-size:11px; font-weight:bold;">RESET FILTRI</button>
        <div id="livelli-container"></div>
    </aside>

    <main class="main">
        <header>
            <input type="text" id="search" placeholder="🔍 Cerca nel testo o codice..." style="flex:1; padding: 8px 15px; border-radius: 20px; border: 1px solid #ccc;">
            <button id="btnDiff" class="toggle-btn" onclick="toggleDiff()">CONFRONTO DIFF: OFF</button>
            <div id="stats" style="font-size:12px; font-weight:bold; color:var(--primary)">Voci: 0</div>
        </header>

        <div class="table-area">
            <table id="mainTable">
                <thead>
                    <tr>
                        <th class="col-cod" onclick="ordina('Codice')">CODICE</th>
                        <th onclick="ordina('Declaratoria')">DESCRIZIONE (Clicca per espandere)</th>
                        <th class="col-pre" onclick="ordina('Prezzo')">PREZZO</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </main>

<script>
    let fullData = [];
    let datiFiltrati = [];
    let showDiff = false;
    let sortConfig = { campo: 'Codice', asc: true };

    const nomiLivelli = ["GENERE", "MACROSETTORE", "SETTORE", "MANUFATTO", "INTERVENTO", "ATTIVITÀ", "LAVORAZIONE", "DISCIPLINA", "SISTEMA", "UNITÀ TECNOLOGICA", "MATERIA"];
    const configFiltri = nomiLivelli.reduce((acc, n, i) => ({...acc, [`f-Liv${i+1}`]: `Descr. Liv. ${i+1}`}), {});

    async function init() {
        // --- BLOCCO PROTEZIONE CON PASSWORD ---
        const passwordSegreta = "LOM2026!"; // <-- Cambia questa stringa se vuoi un'altra password
        let inserita = prompt("Inserisci la password per accedere al Prezzario LOM26:");

        if (inserita !== passwordSegreta) {
            document.body.innerHTML = `
                <div style="font-family:sans-serif; text-align:center; padding:50px;">
                    <h1 style="color:#d93025;">Accesso Negato</h1>
                    <p>Password errata o non inserita. Ricarica la pagina per riprovare.</p>
                </div>`;
            return; 
        }
        // --------------------------------------

        try {
            const res = await fetch('./dati.json');
            const json = await res.json();
            fullData = Object.values(json.Ricerca || json);
            const container = document.getElementById('livelli-container');
            nomiLivelli.forEach((n, i) => container.innerHTML += `<h3>${n}</h3><div class="filter-group"><select id="f-Liv${i+1}"></select></div>`);
            applicaFiltri();
        } catch (error) {
            document.getElementById('stats').innerText = "Errore nel caricamento del file JSON.";
            console.error(error);
        }
    }

    function toggleDiff() {
        showDiff = !showDiff;
        const btn = document.getElementById('btnDiff');
        btn.innerText = `CONFRONTO DIFF: ${showDiff ? 'ON' : 'OFF'}`;
        btn.classList.toggle('active');
        render(datiFiltrati);
    }

    function formattaDettaglio(testo, precedente) {
        if (!testo) return "";
        let elaborato = testo;
        if (showDiff && precedente) {
            let pC = testo.split(' '), pP = precedente.split(' ');
            elaborato = pC.map((p, i) => (p !== pP[i]) ? `<span class="diff-mark">${p}</span>` : p).join(' ');
        }
        return elaborato.replace(/(OPERA:|LAVORO:|SPECIFICHE TECNICHE:|PRODOTTO SEMILAVORATO:|Incluso:)/g, '<br><span class="indent-mark">$1</span>');
    }

    function ordina(campo) {
        sortConfig.asc = (sortConfig.campo === campo) ? !sortConfig.asc : true;
        sortConfig.campo = campo;
        datiFiltrati.sort((a, b) => {
            let vA = a[campo], vB = b[campo];
            return sortConfig.asc ? (vA > vB ? 1 : -1) : (vA < vB ? 1 : -1);
        });
        render(datiFiltrati);
    }

    function applicaFiltri() {
        const q = document.getElementById('search').value.toLowerCase();
        datiFiltrati = fullData.filter(item => {
            if (q && !item.Declaratoria.toLowerCase().includes(q) && !item.Codice.toLowerCase().includes(q)) return false;
            for (let id in configFiltri) {
                const val = document.getElementById(id).value;
                if (val && item[configFiltri[id]] !== val) return false;
            }
            return true;
        });
        document.getElementById('stats').innerText = `VOCI: ${datiFiltrati.length}`;
        aggiornaOpzioniFiltri(q);
        render(datiFiltrati);
    }

    function aggiornaOpzioniFiltri(q) {
        Object.keys(configFiltri).forEach(id => {
            const select = document.getElementById(id);
            if (!select) return;
            const valAttuale = select.value;
            const target = configFiltri[id];
            const disp = fullData.filter(item => {
                if (q && !item.Declaratoria.toLowerCase().includes(q)) return false;
                for (let idOther in configFiltri) {
                    if (idOther === id) continue;
                    const v = document.getElementById(idOther).value;
                    if (v && item[configFiltri[idOther]] !== v) return false;
                }
                return true;
            });
            const unici = [...new Set(disp.map(i => i[target]).filter(v => v && v !== "nd"))].sort();
            select.innerHTML = `<option value="">Tutti (${unici.length})</option>`;
            unici.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v; opt.textContent = v;
                if (v === valAttuale) opt.selected = true;
                select.appendChild(opt);
            });
            select.onchange = applicaFiltri;
        });
    }

    function render(data) {
        const body = document.getElementById('tableBody');
        body.innerHTML = data.slice(0, 50).map((v, i) => `
            <tr class="main-row" onclick="toggleDet(${i})">
                <td class="col-cod">${v.Codice}</td>
                <td><span class="text-truncate">${v.Declaratoria}</span></td>
                <td class="col-pre">€ ${Number(v.Prezzo).toLocaleString('it-IT', {minimumFractionDigits: 2})}</td>
            </tr>
            <tr id="det-${i}" class="details-row">
                <td colspan="3">
                    <div class="details-content">
                        <div>
                            <strong>SCHEDA TECNICA VOCE</strong>
                            <div class="descr-indent">${formattaDettaglio(v.Declaratoria, i > 0 ? data[i-1].Declaratoria : null)}</div>
                        </div>
                        <div style="border-left: 1px solid #eee; padding-left: 20px;">
                            <strong>ATTRIBUTI</strong><br>
                            U.M: ${v['U.M.']} | R.U.: ${v['Rapporto R.U.']}<br><br>
                            <strong>GERARCHIA</strong><br>
                            ${nomiLivelli.map((n, idx) => `<small><strong>${n}:</strong> ${v['Descr. Liv. '+(idx+1)] || '-'}</small>`).join('<br>')}
                        </div>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    function toggleDet(i) {
        const d = document.getElementById(`det-${i}`);
        d.style.display = d.style.display === 'table-row' ? 'none' : 'table-row';
    }

    function resetTutto() {
        document.querySelectorAll('select').forEach(s => s.value = "");
        document.getElementById('search').value = "";
        applicaFiltri();
    }

    document.getElementById('search').addEventListener('input', applicaFiltri);
    init();
</script>
</body>
</html>
