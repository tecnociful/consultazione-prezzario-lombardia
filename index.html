<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>LOM26 Dashboard - Ricerca Avanzata Multipla</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f1f3f4; --accent: #d93025; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; color: #202124; }
        
        /* Sidebar con 11 BOX CHECKBOX */
        .sidebar { width: 380px; background: white; border-right: 1px solid #dadce0; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; flex-shrink: 0; box-shadow: 2px 0 5px rgba(0,0,0,0.05); }
        .sidebar h3 { margin: 0; font-size: 11px; color: var(--primary); text-transform: uppercase; letter-spacing: 0.8px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        
        .filter-box { background: #fafafa; border: 1px solid #e0e0e0; border-radius: 4px; max-height: 150px; overflow-y: auto; padding: 6px; }
        .filter-item { display: flex; align-items: flex-start; gap: 8px; font-size: 10.5px; padding: 3px 0; cursor: pointer; border-bottom: 1px solid #f1f1f1; line-height: 1.3; }
        .filter-item:hover { background: #f1f3f4; }
        .filter-item input { margin-top: 2px; }
        .count { margin-left: auto; color: #70757a; font-size: 9px; font-weight: bold; background: #e8eaed; padding: 1px 4px; border-radius: 8px; flex-shrink: 0; }

        /* Main Area */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        header { background: white; padding: 12px 20px; border-bottom: 1px solid #dadce0; display: flex; gap: 15px; align-items: center; z-index: 10; }
        .btn-diff { padding: 8px 16px; cursor: pointer; border-radius: 20px; border: 1px solid #ccc; font-size: 11px; font-weight: bold; background: #fff; transition: 0.3s; white-space: nowrap; }
        .btn-diff.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* Tabella */
        .table-area { flex: 1; overflow-y: auto; background: white; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: #f8f9fa; padding: 12px; text-align: left; font-size: 11px; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid #eee; color: #5f6368; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; vertical-align: top; cursor: pointer; }
        tr.main-row:hover { background: #f8f9fa; }
        .col-cod { width: 180px; font-family: 'Roboto Mono', monospace; font-weight: bold; color: var(--primary); }
        .text-truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }

        /* Dettaglio Espandibile */
        .details-row { display: none; background: #fcfcfc; border-left: 6px solid var(--primary); }
        .details-content { padding: 25px; font-size: 12.5px; line-height: 1.7; display: grid; grid-template-columns: 1.5fr 1fr; gap: 40px; }
        .indent-mark { font-weight: bold; color: #1a73e8; display: block; margin-top: 10px; border-bottom: 1px solid #e8f0fe; }
        .diff-mark { color: var(--accent); font-weight: bold; background: #fff0f0; border-bottom: 1px solid var(--accent); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <button onclick="resetTutto()" style="padding:10px; cursor:pointer; background:var(--primary); color:white; border:none; border-radius:4px; font-weight:bold; margin-bottom:10px; position: sticky; top: 0; z-index: 20;">RESET TUTTI I FILTRI</button>
        <div id="filtri-container"></div>
    </aside>

    <main class="main">
        <header>
            <input type="text" id="search" placeholder="🔍 Inserisci parole separate (es: sottofondazione c16/20 aggregati)..." style="flex:1; padding: 10px 18px; border-radius: 25px; border: 1px solid #dadce0; font-size: 14px; outline: none;">
            <button id="btnDiff" class="btn-diff" onclick="toggleDiff()">CONFRONTO DIFF: OFF</button>
            <div id="stats" style="font-size:12px; font-weight:bold; color:var(--primary); background: #e8f0fe; padding: 6px 15px; border-radius: 15px;">Voci: 0</div>
        </header>
        <div class="table-area">
            <table id="mainTable">
                <thead>
                    <tr><th class="col-cod">CODICE</th><th>DESCRIZIONE (Clicca per dettagli)</th><th style="width:110px; text-align:right">PREZZO</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </main>

<script>
    let fullData = [];
    let filtriAttivi = {}; 
    let showDiff = false;
    let datiFiltratiCorrenti = [];

    const campi = {
        "GENERE": "Descr. Liv. 1",
        "MACROSETTORE": "Descr. Liv. 2",
        "SETTORE": "Descr. Liv. 3",
        "MANUFATTO/DESTINAZIONE": "Descr. Liv. 4",
        "INTERVENTO": "Descr. Liv. 5",
        "ATTIVITÀ": "Descr. Liv. 6",
        "LAVORAZIONE": "Descr. Liv. 7",
        "DISCIPLINA": "Descr. Liv. 8",
        "SISTEMA": "Descr. Liv. 9",
        "UNITÀ TECNOLOGICA": "Descr. Liv. 10",
        "MATERIA": "Descr. Liv. 11",
        "SETTORE MERCEOLOGICO": "Settore merceologico"
    };

    async function init() {
        try {
            const res = await fetch('./dati.json');
            const json = await res.json();
            fullData = Object.values(json.Ricerca || json);
            
            const container = document.getElementById('filtri-container');
            Object.keys(campi).forEach(titolo => {
                filtriAttivi[titolo] = [];
                container.innerHTML += `<h3>${titolo}</h3><div class="filter-box" id="box-${titolo.replace(/\//g,'-')}"></div><br>`;
            });

            aggiornaEApplica();
        } catch (e) { console.error(e); }
    }

    function toggleDiff() {
        showDiff = !showDiff;
        const btn = document.getElementById('btnDiff');
        btn.innerText = `CONFRONTO DIFF: ${showDiff ? 'ON' : 'OFF'}`;
        btn.classList.toggle('active', showDiff);
        render(datiFiltratiCorrenti);
    }

    function formattaDettaglio(testo, precedente) {
        if (!testo) return "";
        let out = testo;
        if (showDiff && precedente) {
            let pC = testo.split(' '), pP = precedente.split(' ');
            out = pC.map((p, i) => (p !== pP[i]) ? `<span class="diff-mark">${p}</span>` : p).join(' ');
        }
        return out.replace(/(OPERA:|LAVORO:|SPECIFICHE TECNICHE:|PRODOTTO SEMILAVORATO:|Incluso:|RM\d|LV\d|OP\d)/g, '<br><span class="indent-mark">$1</span>');
    }

    function aggiornaEApplica() {
        // Separiamo la stringa di ricerca in un array di singole parole, escludendo gli spazi vuoti
        const terminiRicerca = document.getElementById('search').value.toLowerCase().split(' ').filter(t => t.length > 0);
        
        // 1. Filtraggio principale della tabella
        datiFiltratiCorrenti = fullData.filter(item => {
            const testoVoce = ((item.Declaratoria || "") + " " + (item.Codice || "")).toLowerCase();
            
            // Verifica che OGNI termine inserito sia presente nella stringa della voce
            const matchSearch = terminiRicerca.every(termine => testoVoce.includes(termine));
            
            let matchFiltri = true;
            for (let t in campi) {
                if (filtriAttivi[t].length > 0 && !filtriAttivi[t].includes(item[campi[t]])) {
                    matchFiltri = false; break;
                }
            }
            return matchSearch && matchFiltri;
        });

        // 2. Aggiornamento dinamico delle checkbox e dei rispettivi contatori numerici
        Object.keys(campi).forEach(titolo => {
            const idBox = `box-${titolo.replace(/\//g,'-')}`;
            const box = document.getElementById(idBox);
            const campo = campi[titolo];
            
            const datiPerQuestoBox = fullData.filter(item => {
                const testoVoce = ((item.Declaratoria || "") + " " + (item.Codice || "")).toLowerCase();
                const matchS = terminiRicerca.every(t => testoVoce.includes(t));
                if (!matchS) return false;

                for (let t in campi) {
                    if (t === titolo) continue;
                    if (filtriAttivi[t].length > 0 && !filtriAttivi[t].includes(item[campi[t]])) return false;
                }
                return true;
            });

            const conteggi = {};
            datiPerQuestoBox.forEach(item => {
                const val = item[campo] || "nd";
                conteggi[val] = (conteggi[val] || 0) + 1;
            });

            const valoriOrdinati = Object.keys(conteggi).sort();
            box.innerHTML = valoriOrdinati.map(val => `
                <label class="filter-item">
                    <input type="checkbox" ${filtriAttivi[titolo].includes(val) ? 'checked' : ''} 
                           onchange="gestisciFiltro('${titolo}', '${val.replace(/'/g, "\\'")}')">
                    <span>${val}</span>
                    <span class="count">${conteggi[val]}</span>
                </label>
            `).join('');
        });

        document.getElementById('stats').innerText = `Trovate: ${datiFiltratiCorrenti.length.toLocaleString('it-IT')}`;
        render(datiFiltratiCorrenti);
    }

    function gestisciFiltro(titolo, valore) {
        const index = filtriAttivi[titolo].indexOf(valore);
        if (index > -1) filtriAttivi[titolo].splice(index, 1);
        else filtriAttivi[titolo].push(valore);
        aggiornaEApplica();
    }

    function render(data) {
        const body = document.getElementById('tableBody');
        body.innerHTML = data.slice(0, 100).map((v, i) => `
            <tr class="main-row" onclick="toggleDet(${i})">
                <td class="col-cod">${v.Codice}</td>
                <td><span class="text-truncate">${v.Declaratoria}</span></td>
                <td style="text-align:right; font-weight:bold;">€ ${Number(v.Prezzo).toLocaleString('it-IT', {minimumFractionDigits:2})}</td>
            </tr>
            <tr id="det-${i}" class="details-row">
                <td colspan="3"><div class="details-content">
                    <div>
                        <strong style="color:var(--primary); font-size:14px;">DESCRIZIONE ANALITICA</strong><br>
                        ${formattaDettaglio(v.Declaratoria, i > 0 ? data[i-1].Declaratoria : null)}
                    </div>
                    <div style="border-left:1px solid #dadce0; padding-left:25px; background: #fff; padding: 15px; border-radius: 8px;">
                        <strong style="color:var(--primary);">DETTAGLI RISORSA</strong><hr>
                        <strong>U.M:</strong> ${v['U.M.']}<br>
                        <strong>Rapporto R.U.:</strong> ${v['Rapporto R.U.']}<br>
                        <strong>Settore Merceologico:</strong> ${v['Settore merceologico']}<hr>
                        <strong>GERARCHIA COMPLETA:</strong><br>
                        ${Object.keys(campi).map(k => `<div style="font-size:11px; margin-bottom:2px;"><strong>${k}:</strong> ${v[campi[k]] || '-'}</div>`).join('')}
                    </div>
                </div></td>
            </tr>
        `).join('');
    }

    function toggleDet(i) {
        const d = document.getElementById(`det-${i}`);
        d.style.display = d.style.display === 'table-row' ? 'none' : 'table-row';
    }

    function resetTutto() {
        Object.keys(filtriAttivi).forEach(t => filtriAttivi[t] = []);
        document.getElementById('search').value = "";
        aggiornaEApplica();
    }

    document.getElementById('search').addEventListener('input', aggiornaEApplica);
    init();
</script>
</body>
</html>
