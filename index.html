<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prezzario LOM26 - Navigazione Agile</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f4f7f9; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 20px; }
        
        /* Pannello Filtri */
        .filter-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #eee; }
        select, input { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; width: 100%; box-sizing: border-box; }
        
        .stats { font-size: 14px; color: #666; margin-bottom: 10px; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        th { background: #1a73e8; color: white; padding: 12px; text-align: left; font-size: 13px; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; line-height: 1.5; vertical-align: top; word-wrap: break-word; }
        
        .codice { font-family: monospace; font-weight: bold; color: #1a73e8; width: 150px; }
        .prezzo { font-weight: bold; text-align: right; width: 100px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Navigazione Prezzario LOM26</h2>
    
    <div class="filter-panel">
        <select id="filtroGenere"><option value="">Livello 1 (es. OC)</option></select>
        <select id="filtroFamiglia" disabled><option value="">Livello 2</option></select>
        <select id="filtroCategoria" disabled><option value="">Livello 3</option></select>
        <input type="text" id="filtroTesto" placeholder="Cerca parola chiave...">
    </div>

    <div id="stats" class="stats">Caricamento database in corso...</div>

    <table id="tabella">
        <thead>
            <tr>
                <th style="width: 150px;">Codice</th>
                <th>Descrizione</th>
                <th style="width: 100px; text-align: right;">Prezzo</th>
            </tr>
        </thead>
        <tbody id="corpoTabella"></tbody>
    </table>
</div>

<script>
    let datiPrezzario = [];

    // 1. CARICAMENTO DATI
    async function init() {
        try {
            const response = await fetch('./dati.json');
            const jsonGrezzo = await response.json();

            // Trasformiamo l'oggetto "Ricerca" in una lista (array)
            if (jsonGrezzo.Ricerca) {
                datiPrezzario = Object.values(jsonGrezzo.Ricerca);
            } else {
                datiPrezzario = Array.isArray(jsonGrezzo) ? jsonGrezzo : Object.values(jsonGrezzo);
            }

            document.getElementById('stats').innerText = `Database pronto. Totale voci: ${datiPrezzario.length}`;
            
            // Popoliamo il primo filtro (es. OC, LP, ecc.)
            popolaFiltro('filtroGenere', 0);
            aggiornaVista();
            
        } catch (error) {
            document.getElementById('stats').innerText = "Errore nel caricamento del file dati.json.";
            console.error(error);
        }
    }

    // 2. FUNZIONE PER SMONTARE IL CODICE
    function getLivelli(codice) {
        return codice ? codice.split('.') : [];
    }

    // 3. POPOLAMENTO DINAMICO DEI FILTRI
    function popolaFiltro(idElemento, indiceLivello, prefisso = "") {
        const select = document.getElementById(idElemento);
        const termini = new Set();
        
        datiPrezzario.forEach(v => {
            const livelli = getLivelli(v.Codice);
            if (livelli[indiceLivello] && v.Codice.startsWith(prefisso)) {
                termini.add(livelli[indiceLivello]);
            }
        });

        select.innerHTML = `<option value="">Tutti</option>`;
        Array.from(termini).sort().forEach(t => {
            select.innerHTML += `<option value="${t}">${t}</option>`;
        });
    }

    // 4. VISUALIZZAZIONE RISULTATI
    function aggiornaVista() {
        const gen = document.getElementById('filtroGenere').value;
        const fam = document.getElementById('filtroFamiglia').value;
        const cat = document.getElementById('filtroCategoria').value;
        const testo = document.getElementById('filtroTesto').value.toLowerCase();

        const filtrati = datiPrezzario.filter(v => {
            const livelli = getLivelli(v.Codice);
            const matchGen = !gen || livelli[0] === gen;
            const matchFam = !fam || livelli[1] === fam;
            const matchCat = !cat || livelli[2] === cat;
            const matchTesto = !testo || (v.Declaratoria || "").toLowerCase().includes(testo) || (v.Codice || "").toLowerCase().includes(testo);
            return matchGen && matchFam && matchCat && matchTesto;
        });

        document.getElementById('stats').innerText = `Risultati trovati: ${filtrati.length}`;
        
        const corpo = document.getElementById('corpoTabella');
        corpo.innerHTML = filtrati.slice(0, 50).map(v => `
            <tr>
                <td class="codice">${v.Codice}</td>
                <td>${v.Declaratoria}</td>
                <td class="prezzo">€ ${v.Prezzo}</td>
            </tr>
        `).join('');
    }

    // 5. GESTIONE EVENTI (CAMBIAMENTO FILTRI)
    document.getElementById('filtroGenere').addEventListener('change', function() {
        const fam = document.getElementById('filtroFamiglia');
        const cat = document.getElementById('filtroCategoria');
        if (this.value) {
            fam.disabled = false;
            popolaFiltro('filtroFamiglia', 1, this.value + ".");
        } else {
            fam.disabled = true;
            cat.disabled = true;
            fam.value = "";
            cat.value = "";
        }
        aggiornaVista();
    });

    document.getElementById('filtroFamiglia').addEventListener('change', function() {
        const cat = document.getElementById('filtroCategoria');
        const gen = document.getElementById('filtroGenere').value;
        if (this.value) {
            cat.disabled = false;
            popolaFiltro('filtroCategoria', 2, gen + "." + this.value + ".");
        } else {
            cat.disabled = true;
            cat.value = "";
        }
        aggiornaVista();
    });

    document.getElementById('filtroCategoria').addEventListener('change', aggiornaVista);
    document.getElementById('filtroTesto').addEventListener('input', aggiornaVista);

    // AVVIO
    init();
</script>
</body>
</html>
